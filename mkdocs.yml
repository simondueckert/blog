site_name: Leben, Lernen und Arbeiten im 21. Jahrhundert
site_url: https://blog.dueckert.eu
docs_dir: src
site_dir: site
edit_uri: ''

nav:
    - 👋 Hallo Welt: index.md
    - 🙋‍♂️ Über mich: about.md
    - 🛠️ Projekte: projects.md
    - 📚 Publikationen: publications.md
    - 💭 Microblog: microblog.md
    - 🏷️ Tags: tags.md

theme:
    name: 'material'
    custom_dir: src/overrides
    features:
        - navigation.indexes
        - search.highlight
        - search.share
    palette:
      primary: teal
    language: de
    icon:
      logo: material/home
      repo: fontawesome/brands/github
      language: de

extra_css:
  - stylesheets/extra.css

repo_name: 'simondueckert/blog'
repo_url: 'https://github.com/simondueckert/blog'

extra:
    homepage: https://blog.dueckert.eu
    social:
        - icon: fontawesome/brands/mastodon
          link: 'https://colearn.social/@simondueckert'
        - icon: fontawesome/brands/linkedin
          link: 'https://www.linkedin.com/in/simondueckert/'
        - icon: fontawesome/brands/github
          link: 'https://github.com/simondueckert'
    giscus: true
    generator: false

copyright: Simon Dückert, Creative Commons Attribution 4.0 International (CC BY)

hooks:
  - hooks/zotero_publications.py

plugins:
  - search
  - tags
  - blog:
      blog_dir: .
      # Kontrollierter Kategoriensatz. Aktivieren (auskommentieren entfernen),
      # sobald alle Beitraege ueberarbeitet sind. Bei aktivierter Liste bricht
      # der Build ab, wenn ein Beitrag eine hier nicht aufgefuehrte Kategorie
      # verwendet. Platzhalter unten durch die echten Kategorien ersetzen.
      # categories_allowed:
      #   - Platzhalter Kategorie 1
      #   - Platzhalter Kategorie 2
      #   - Platzhalter Kategorie 3
      #   - Platzhalter Kategorie 4
      #   - Platzhalter Kategorie 5
      #   - Platzhalter Kategorie 6
      #   - Platzhalter Kategorie 7
  - rss:
      match_path: posts/.*
      date_from_meta:
        as_creation: date
  - mermaid2

markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
        # make exceptions to highlighting of code:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - toc
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
